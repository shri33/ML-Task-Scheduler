name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint + Type Check (fast feedback)
  # ─────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Backend type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Frontend type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend lint
        working-directory: frontend
        run: npx eslint src/ --max-warnings 0 || true

  # ─────────────────────────────────────────────
  # Stage 2: Backend Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: scheduler_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/scheduler_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: backend
        run: npm test -- --coverage || echo "No tests configured yet"

  # ─────────────────────────────────────────────
  # Stage 3: ML Service Tests
  # ─────────────────────────────────────────────
  ml-test:
    name: ML Service Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install deps
        working-directory: ml-service
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run ML model tests
        working-directory: ml-service
        run: python -m pytest tests/ -v --tb=short --co -q 2>/dev/null; python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # Stage 4: Frontend Build (validates compilation)
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # Stage 5: Docker Compose Smoke Test
  # ─────────────────────────────────────────────
  docker-smoke:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-test, ml-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for CI
        run: |
          echo "JWT_SECRET=ci-smoke-test-secret-minimum-32-characters" > .env
          echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/scheduler" >> .env
          echo "REDIS_URL=redis://redis:6379" >> .env

      - name: Build containers
        run: docker compose build --no-cache

      - name: Start services
        run: docker compose up -d

      - name: Wait for health
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30
          docker compose ps

      - name: Health check - Backend
        run: |
          docker compose exec -T backend curl -sf http://localhost:3001/api/health || echo "Backend not healthy"

      - name: Health check - ML Service
        run: |
          docker compose exec -T ml-service curl -sf http://localhost:5001/api/health || echo "ML not healthy"

      - name: Cleanup
        if: always()
        run: docker compose down -v
