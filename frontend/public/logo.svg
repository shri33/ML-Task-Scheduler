<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="logo-gradient-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Circular Background with Glow -->
  <circle cx="256" cy="256" r="230" fill="url(#logo-gradient-main)" filter="url(#glow)" opacity="0.1" />
  <circle cx="256" cy="256" r="200" fill="url(#logo-gradient-main)" />
  
  <!-- Clock Hands (Scheduler Motif) -->
  <path d="M256 120v136l80 45" stroke="white" stroke-width="24" stroke-linecap="round" fill="none" />
  
  <!-- Center Node -->
  <circle cx="256" cy="256" r="32" fill="white" />
  
  <!-- Orbiting Nodes (Task Motif) -->
  <circle cx="410" cy="256" r="24" fill="white" opacity="0.6" />
  <circle cx="102" cy="256" r="24" fill="white" opacity="0.6" />
  <circle cx="256" cy="102" r="16" fill="white" opacity="0.4" />
  <circle cx="256" cy="410" r="16" fill="white" opacity="0.4" />
  
  <!-- Orbital Paths -->
  <circle cx="256" cy="256" r="154" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.2" stroke-dasharray="20 20" />
</svg>
