<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)"/>
  <!-- Neural network connections -->
  <g stroke="#E0E7FF" stroke-width="6" stroke-opacity="0.5" fill="none">
    <!-- Left to middle connections -->
    <line x1="128" y1="160" x2="240" y2="200"/>
    <line x1="128" y1="256" x2="240" y2="200"/>
    <line x1="128" y1="256" x2="240" y2="312"/>
    <line x1="128" y1="352" x2="240" y2="312"/>
    <!-- Middle to right connections -->
    <line x1="240" y1="200" x2="368" y2="256"/>
    <line x1="240" y1="312" x2="368" y2="256"/>
  </g>
  <!-- Clock arc (task scheduler) -->
  <circle cx="368" cy="256" r="60" fill="none" stroke="#E0E7FF" stroke-width="6" stroke-opacity="0.4" stroke-dasharray="12 8"/>
  <line x1="368" y1="256" x2="368" y2="216" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="368" y1="256" x2="396" y2="268" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Neural network nodes -->
  <circle cx="128" cy="160" r="22" fill="url(#nodeGrad)"/>
  <circle cx="128" cy="256" r="22" fill="url(#nodeGrad)"/>
  <circle cx="128" cy="352" r="22" fill="url(#nodeGrad)"/>
  <circle cx="240" cy="200" r="26" fill="white"/>
  <circle cx="240" cy="312" r="26" fill="white"/>
  <circle cx="368" cy="256" r="30" fill="white"/>
  <!-- ML text -->
  <text x="256" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="4">ML</text>
</svg>
