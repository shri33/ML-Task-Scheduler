services:
  # ===========================================================================
  # DATABASE (PostgreSQL)
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: task-scheduler-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-task_scheduler}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # REDIS (Cache + Queue)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: task-scheduler-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # BACKEND API
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-task_scheduler}?schema=public
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      COOKIE_SECURE: "false"
      ML_SERVICE_URL: http://ml-service:5001
      CORS_ORIGIN: http://localhost:3000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-minimum-32-char-length-1234567890}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 15s
      retries: 5
      start_period: 30s
    command: >
      sh -c "npx prisma db push && npm start"
    networks:
      - internal
      - public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # ML SERVICE
  # ===========================================================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-task_scheduler}?schema=public
      ML_API_KEY: ${ML_API_KEY:-ml-secret-key-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # FRONTEND (Nginx)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # OBSERVABILITY - PROMETHEUS
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: task-scheduler-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/console_templates'
    ports:
      - "9090:9090"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # OBSERVABILITY - GRAFANA
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: task-scheduler-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
