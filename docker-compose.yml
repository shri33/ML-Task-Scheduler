services:
  # ===========================================================================
  # DATABASE (PostgreSQL)
  # ===========================================================================
  db:
    image: postgres:15-alpine
    container_name: task-scheduler-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-task_scheduler}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================================================
  # REDIS (Cache + Queue)
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: task-scheduler-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --maxmemory 200mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ===========================================================================
  # BACKEND API
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - ./backend/.env
    container_name: task-scheduler-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-task_scheduler}?schema=public&connection_limit=20
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      COOKIE_SECURE: "false"
      ML_SERVICE_URL: http://ml-service:5001
      CORS_ORIGIN: http://localhost:3000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in your environment}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      sh -c "npx prisma migrate deploy && npm start"
    networks:
      - internal
      - public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # ML SERVICE
  # ===========================================================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      FLASK_ENV: ${FLASK_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-task_scheduler}?schema=public&connection_limit=5
      ML_API_KEY: ${ML_API_KEY:-ml-secret-key-change-in-production}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/api/health || exit 1"]
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 15s
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================================================
  # FRONTEND (Nginx)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
        VITE_ENABLE_DEMO: "true"
    container_name: task-scheduler-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - public
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===========================================================================
  # OBSERVABILITY - PROMETHEUS
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: task-scheduler-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/console_templates'
    ports:
      - "9090:9090"
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # OBSERVABILITY - GRAFANA
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: task-scheduler-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - internal
      - public
    deploy:
      resources:
        limits:
          memory: 256M

  # ===========================================================================
  # BACKGROUND WORKERS
  # ===========================================================================
  prediction-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-worker-prediction
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-task_scheduler}?schema=public
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:5001
      NODE_ENV: production
      WORKER_CONCURRENCY: 5
    command: node dist/workers/prediction.worker.js
    depends_on:
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M

  scheduling-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-worker-scheduling
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-task_scheduler}?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      SCHEDULING_WORKER_CONCURRENCY: 2
    command: node dist/workers/scheduling.worker.js
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 384M

  notification-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-worker-notification
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    command: node dist/workers/notification.worker.js
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M

  retrain-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: task-scheduler-worker-retrain
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-task_scheduler}?schema=public
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml-service:5001
      ML_API_KEY: ${ML_API_KEY:-ml-secret-key-change-in-production}
      NODE_ENV: production
    command: node dist/workers/autoRetrain.worker.js
    depends_on:
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  public:
    driver: bridge
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
